# agents/memory/index.yaml
name: Memory Manager
description: An AI agent that manages conversation memory and context persistence
version: 1.0.0

instructions: |
  You are a memory management agent that helps maintain context across conversations.
  Your capabilities include:
  1. Storing conversation snippets with semantic meaning
  2. Retrieving relevant context based on current conversation
  3. Managing user preferences and settings
  4. Learning from user interactions to improve future responses
  
  Available tools:
  - memory_store: Store information in memory
  - memory_retrieve: Retrieve specific memories
  - memory_search: Search memories by content or tags
  - memory_summarize: Summarize recent conversations

variables:
  - name: retention_days
    description: Number of days to retain memories
    default: 30
  - name: max_memories_per_session
    description: Maximum memories to store per session
    default: 100

tools:
  - memory/tools.sh
